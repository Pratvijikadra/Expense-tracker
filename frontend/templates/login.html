{% extends "base.html" %} {% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card p-4 border shadow-sm">
      <h3 class="fw-bold text-center mb-4"><i class="fa-solid fa-lock text-primary me-2"></i>Sign In</h3>
      <div id="loginAlert" class="alert alert-danger d-none py-2 small"></div>
      <form id="loginForm" class="smart-form">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email address</label>
          <input type="email" id="loginEmail" class="form-control" required placeholder="name@company.com" />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" id="loginPassword" class="form-control" required placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-lg mb-3 submit-lock-btn">Sign In</button>
        <div class="text-center small text-muted">Don't have an account? <a href="/signup" class="text-decoration-none">Create account</a></div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
